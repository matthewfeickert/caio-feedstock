schema_version: 1

context:
  version: "0.10.2"

package:
  name: caio
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/c/caio/caio-${{ version }}.tar.gz
  sha256: 83b86d3c211ac585b979494848283443f3169d04ea9a0310dec2c9d577a1fba6

build:
  number: 1
  script:
    - ${{ PYTHON }} -m pip install . -vv

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - if: build_platform != target_platform
      then:
        - cross-python_${{ target_platform }}
        - python
  host:
    - pip
    - python
    - setuptools >=77
  run:
    - python

tests:
  - python:
      imports:
        - caio
      pip_check: true

about:
  summary: Asynchronous file IO for Linux Posix and Windows.
  license: Apache-2.0
  license_file: COPYING
  homepage: https://github.com/mosquito/caio

extra:
  recipe-maintainers:
    - thewchan
    - matthewfeickert
